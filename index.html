<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instruction Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="shell">

    <header class="site-header">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 7v5l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Read Aloud
      </div>
      <div class="counter-badge" id="counter">Instruction 1 / 15</div>
    </header>

    <main class="card-stage">
      <div class="card" id="card">
        <div class="step-number" id="stepNum">01</div>
        <p class="instruction-text" id="instructionText"></p>
        <div class="wave-bar" id="waveBar">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </main>

    <footer class="controls">
      <button class="btn btn-secondary" id="prevBtn" onclick="prev()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Previous
      </button>

      <button class="btn btn-speak" id="speakBtn" onclick="speak()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M7 5L3 8H1v2h2l4 3V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M11 6.5a3 3 0 010 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13.5 4.5a6 6 0 010 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Speak
      </button>

      <button class="btn btn-secondary" id="nextBtn" onclick="next()">
        Next
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </footer>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
