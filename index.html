<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instruction Reader Prajjwal Raut</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Instruction Reader</h1>

      <button class="toggle-btn" onclick="togglePanel()">
        Add Conversation
      </button>
    </div>

    <!-- Add Conversation Panel -->
    <div class="panel" id="panel">

      <input
        type="text"
        id="conversationTitle"
        placeholder="Conversation Name"
      >

      <textarea
        id="instructionInput"
        placeholder="Write one instruction per line..."
      ></textarea>

      <div class="panel-buttons">

        <input type="file" id="fileInput" accept=".txt">

        <button onclick="saveConversation()">
          Save Conversation
        </button>

      </div>

    </div>

    <!-- Conversation List -->
    <div class="conversation-list" id="conversationList"></div>

    <!-- Main Card -->
    <div class="card">

      <div class="step-number" id="stepNumber">
        01
      </div>

      <p class="instruction-text" id="instructionText"></p>

      <div class="wave" id="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <!-- Counter -->
    <div class="counter" id="counter">
      Instruction 1 / 15
    </div>

    <!-- Buttons -->
    <div class="controls">

      <button onclick="prevInstruction()">
        Previous
      </button>

      <button class="speak-btn" onclick="speakInstruction()">
        Speak
      </button>

      <button onclick="stopSpeech()">
        Stop
      </button>

      <button onclick="nextInstruction()">
        Next
      </button>

    </div>

    <!-- Progress -->
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
